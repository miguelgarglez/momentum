name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Release Please version marker
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            rg -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          else
            grep -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          fi

      - name: Release Please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
