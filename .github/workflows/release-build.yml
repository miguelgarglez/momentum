name: Release build

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to package and upload (example: v1.8.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to package and upload (example: v1.8.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'

      - name: Xcode version
        run: |
          set -euo pipefail
          xcodebuild -version
          XCODE_MAJOR=$(xcodebuild -version | awk '/Xcode/{split($2,v,"."); print v[1]}')
          if [ "$XCODE_MAJOR" -lt 26 ]; then
            echo "Momentum release build requires Xcode 26+ to build symbol effects used by the app." >&2
            exit 1
          fi

      - name: Verify Release Please version marker
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            rg -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          else
            grep -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          fi

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Lint (SwiftLint)
        run: |
          set -euo pipefail
          SWIFTLINT_CACHE_PATH=.swiftlint-cache swiftlint --config .swiftlint.yml

      - name: Build for testing
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build-for-testing

      - name: Run unit tests
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            -only-testing:MomentumTests

      - name: Package release artifacts
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
          OUTPUT_DIR: ${{ github.workspace }}/release-artifacts
          DERIVED_DATA: ${{ runner.temp }}/DerivedDataRelease
        run: |
          set -euo pipefail
          bash scripts/release/build_and_package_macos.sh

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
          OUTPUT_DIR: ${{ github.workspace }}/release-artifacts
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          bash scripts/release/upload_release_assets.sh

      - name: Upload artifacts as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets-${{ github.event.release.tag_name }}
          path: release-artifacts
