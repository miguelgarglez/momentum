name: Release build

on:
  release:
    types: [created]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Verify Release Please version marker
        run: |
          set -euo pipefail
          rg -n "MARKETING_VERSION = .*// x-release-please-version" Momentum.xcodeproj/project.pbxproj >/dev/null

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Lint (SwiftLint)
        run: |
          set -euo pipefail
          SWIFTLINT_CACHE_PATH=.swiftlint-cache swiftlint --config .swiftlint.yml

      - name: Build for testing
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build-for-testing

      - name: Run unit tests
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            -only-testing:MomentumTests
