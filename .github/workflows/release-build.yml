name: Release build

on:
  release:
    types: [created]

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'

      - name: Xcode version
        run: |
          set -euo pipefail
          xcodebuild -version
          XCODE_MAJOR=$(xcodebuild -version | awk '/Xcode/{split($2,v,"."); print v[1]}')
          if [ "$XCODE_MAJOR" -lt 26 ]; then
            echo "Momentum release build requires Xcode 26+ to build symbol effects used by the app." >&2
            exit 1
          fi

      - name: Verify Release Please version marker
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            rg -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          else
            grep -n "MARKETING_VERSION = .*// x-release-please-version" Configs/Version.xcconfig >/dev/null
          fi

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Lint (SwiftLint)
        run: |
          set -euo pipefail
          SWIFTLINT_CACHE_PATH=.swiftlint-cache swiftlint --config .swiftlint.yml

      - name: Build for testing
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build-for-testing

      - name: Run unit tests
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          mkdir -p "$DERIVED_DATA"
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            -only-testing:MomentumTests
