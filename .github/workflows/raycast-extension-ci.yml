name: Raycast Extension CI

on:
  push:
    branches:
      - main
    paths:
      - "RaycastExtension/momentum/**"
      - ".github/workflows/raycast-extension-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "RaycastExtension/momentum/**"
      - ".github/workflows/raycast-extension-ci.yml"
  workflow_dispatch:

jobs:
  raycast-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RaycastExtension/momentum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RaycastExtension/momentum/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
